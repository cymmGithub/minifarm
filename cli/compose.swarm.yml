# Docker Swarm Stack for Minifarm Clients
# Deploy with: docker stack deploy -c compose.swarm.yml minifarm
# Update with: docker service update --image 10.0.1.1:5000/minifarm-client:<tag> minifarm_minifarm-client
services:
  minifarm-client:
    image: 10.0.1.1:5000/minifarm-client:latest

    deploy:
      mode: global  # Exactly one container per Swarm node
      placement:
        constraints:
          - node.role == worker  # Only deploy on worker nodes, not manager
      update_config:
        parallelism: 3           # Update 3 clients simultaneously
        delay: 5s                # Wait 5s between batches
        failure_action: rollback # Rollback on failure
        order: stop-first        # Stop old before starting new (required for host-mode ports)
      rollback_config:
        parallelism: 3
        delay: 5s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

    # Note: ipc: host is not supported in Swarm mode
    # Chromium should work fine without it in containers with sufficient shared memory
    # If issues occur, increase shared memory via tmpfs mount (see below)

    ports:
      - target: 3802
        published: 3802
        mode: host  # Use host mode for direct port binding per node

    environment:
      - NODE_ENV=develop
      - PORT=3802
      - PATH_TO_PLAYWRIGHT=/playwright
      - PATH_TO_REPORTS=/tmp/reports
      - MASTER_URL=http://10.0.1.1:3801

    extra_hosts:
      - "minifarm-master:10.0.1.1"
      - "account.minifarm.local:10.0.1.1"
      - "mtest.minifarm.local:10.0.1.1"
      - "hq.minifarm.local:10.0.1.1"
      - "clinicians.minifarm.local:10.0.1.1"
      - "office.minifarm.local:10.0.1.1"
      - "demo-sso.minifarm.local:10.0.1.1"
      - "dbserver:10.0.1.1"

    # Simple startup - client config comes from static clients.json on server
    command: ["node", "./bin/www"]

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3802/ping', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

  # Portainer Agent - Runs on ALL nodes for direct access
  agent:
    image: portainer/agent:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/volumes:/var/lib/docker/volumes:ro
    networks:
      - agent_network
    deploy:
      mode: global  # One agent per node (manager + all 13 clients)
      restart_policy:
        condition: on-failure

  # Portainer - Management dashboard
  portainer:
    image: portainer/portainer-ce:latest
    command: -H tcp://tasks.agent:9001 --tlsskipverify
    ports:
      - "9000:9000"
      - "8000:8000"
    volumes:
      - portainer_data:/data
    networks:
      - agent_network
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  # Docker Registry - Hosts minifarm-client images
  docker-registry:
    image: registry:3
    environment:
      REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY: /var/lib/registry
      REGISTRY_LOG_LEVEL: info
    volumes:
      - docker_registry_data:/var/lib/registry
    ports:
      - target: 5000
        published: 5000
        mode: host
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

networks:
  default:
    driver: overlay
    attachable: true
    ipam:
      config:
        - subnet: 10.0.10.0/24
  agent_network:
    driver: overlay
    attachable: true
    ipam:
      config:
        - subnet: 10.0.11.0/24

volumes:
  docker_registry_data:
  portainer_data:
